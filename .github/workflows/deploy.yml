name: Deploy

# Runs on every push to main. Builds the test image, validates it, then
# builds and pushes the production image to Artifact Registry and deploys
# to Cloud Run. Both images use the GHA layer cache, so incremental builds
# are fast even though we build fresh here.
#
# Why we build fresh rather than promoting the CI image:
#   ci.yml runs on pull_request. When a PR is merged, GitHub creates a new
#   merge commit with a different SHA — a promotion attempt would look for
#   an image at a SHA that never existed in the registry.
#
# Rollback model:
#   Deploys use immutable :SHA images. Before each deploy we capture the
#   currently-serving Cloud Run revision; if the post-deploy health check
#   fails we shift 100% of traffic back to that revision. This pulls no
#   image (the revision already pins its own digest), so rollback can never
#   fail on a missing tag — and Terraform only ever sees real :SHA images.
#
# Required GitHub Actions variables (set in repo Settings → Variables):
#   GCP_WORKLOAD_IDENTITY_PROVIDER  — terraform output workload_identity_provider
#   GCP_DEPLOY_SA                   — terraform output github_deploy_sa
#   GCP_REGION                      — e.g. us-central1
#   GCP_IMAGE_REPO                  — terraform output artifact_registry_repo
#   GCP_CLOUD_RUN_SERVICE           — Cloud Run service name (tradingagents)
#
# Note: the Cloud Run service URL is obtained automatically from the deploy
# step's output and does not need to be stored as a separate variable.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'terraform/**'

permissions:
  contents: read
  id-token: write   # Workload Identity Federation
  issues: write     # open rollback issue on health-check failure

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the test image and run the full test suite.
  #    Nothing downstream runs if tests fail.
  # ---------------------------------------------------------------------------
  test:
    name: Tests (unit · smoke · regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          target: test
          load: true
          tags: tradingagents-test:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: |
          docker run --rm tradingagents-test:${{ github.sha }}

  # ---------------------------------------------------------------------------
  # 2. Build the production image and push to Artifact Registry.
  #    Runs only after tests pass. Images are immutable :SHA (+ :latest as a
  #    convenience pointer). Rollback no longer depends on a mutable tag.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push to Artifact Registry
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ vars.GCP_IMAGE_REPO }}/app:${{ github.sha }}
            ${{ vars.GCP_IMAGE_REPO }}/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 3. Deploy the new image to Cloud Run.
  #    Captures the currently-serving revision first so the health-check job
  #    can roll traffic back to it without redeploying an image.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
      prev_revision: ${{ steps.prev.outputs.revision }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - id: prev
        name: Capture currently-serving revision (rollback target)
        run: |
          REV=$(gcloud run services describe ${{ vars.GCP_CLOUD_RUN_SERVICE }} \
            --region ${{ vars.GCP_REGION }} \
            --format='value(status.latestReadyRevisionName)' 2>/dev/null || true)
          echo "revision=$REV" >> "$GITHUB_OUTPUT"
          echo "Previous ready revision: ${REV:-<none — first deploy>}"

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          image: ${{ vars.GCP_IMAGE_REPO }}/app:${{ github.sha }}
          region: ${{ vars.GCP_REGION }}

  # ---------------------------------------------------------------------------
  # 4. Health check — polls /health for up to 120s.
  #    On failure: rolls traffic back to the previous revision and opens an issue.
  # ---------------------------------------------------------------------------
  health-check:
    name: Health check & rollback
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
          token_format: 'id_token'
          id_token_audience: ${{ needs.deploy.outputs.service_url }}
          id_token_include_email: true

      - name: Poll /health endpoint
        id: health
        run: |
          SERVICE_URL="${{ needs.deploy.outputs.service_url }}"
          echo "Service URL: $SERVICE_URL"
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ steps.auth.outputs.id_token }}" \
              --connect-timeout 5 --max-time 10 \
              "$SERVICE_URL/health" 2>/dev/null || echo "000")
            echo "Attempt $i/12: HTTP $CODE"
            [ "$CODE" = "200" ] && echo "Health check passed." && exit 0
            sleep 10
          done
          echo "::error::Health check failed after 120s"
          exit 1
        continue-on-error: true

      - name: Roll traffic back to previous revision on failure
        if: steps.health.outcome == 'failure' && needs.deploy.outputs.prev_revision != ''
        run: |
          echo "Rolling traffic back to ${{ needs.deploy.outputs.prev_revision }}..."
          gcloud run services update-traffic ${{ vars.GCP_CLOUD_RUN_SERVICE }} \
            --region ${{ vars.GCP_REGION }} \
            --to-revisions=${{ needs.deploy.outputs.prev_revision }}=100 \
            --quiet
          echo "Rollback complete."

      - name: Warn when no rollback target (first deploy)
        if: steps.health.outcome == 'failure' && needs.deploy.outputs.prev_revision == ''
        run: echo "::warning::Health check failed but there is no previous revision to roll back to (first deploy)."

      - name: Open GitHub issue on rollback
        if: steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const prev = `${{ needs.deploy.outputs.prev_revision }}`;
            const rolledBack = prev
              ? `The service was automatically rolled back to revision \`${prev}\`.`
              : 'No previous revision existed, so no rollback was performed — the service may be serving a broken revision.';
            await github.rest.issues.create({
              ...context.repo,
              title: `Deploy rollback triggered — ${context.sha.slice(0, 7)}`,
              body: [
                '## Deploy Health Check Failed',
                '',
                `Cloud Run failed \`/health\` after deploying commit \`${context.sha}\`.`,
                rolledBack,
                '',
                `**Commit:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`,
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['deployment', 'needs-triage'],
            });

      - name: Fail workflow after rollback
        if: steps.health.outcome == 'failure'
        run: exit 1
