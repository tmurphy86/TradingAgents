name: Terraform

# Plan on PRs that touch terraform/; apply on merge to main.

on:
  pull_request:
    paths:
      - 'terraform/**'
  push:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  contents: read
  id-token: write       # Workload Identity Federation
  pull-requests: write  # post plan as PR comment

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    # Terraform variables are supplied via TF_VAR_* env vars (GitHub Actions variables).
    # No terraform.tfvars file is needed in CI.
    # To update a value: gh variable set TF_VAR_PROJECT_ID --body "new-value" --repo owner/repo
    env:
      TF_VAR_project_id:     ${{ vars.TF_VAR_PROJECT_ID }}
      TF_VAR_region:         ${{ vars.TF_VAR_REGION }}
      TF_VAR_github_owner:   ${{ github.repository_owner }}
      TF_VAR_github_repo:    ${{ github.event.repository.name }}
      TF_VAR_invoker_email:  ${{ vars.TF_VAR_INVOKER_EMAIL }}
      TF_VAR_active_secrets: ${{ vars.TF_VAR_ACTIVE_SECRETS }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: fmt check
        run: terraform fmt -check

      - name: init
        run: terraform init -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}" -input=false

      - name: validate
        run: terraform validate

      - name: plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      # Post the plan as a PR comment (create or update the existing bot comment)
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_EXIT_CODE: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const planFile = path.join(process.env.GITHUB_WORKSPACE, 'terraform', 'plan-output.txt');
            const raw = fs.readFileSync(planFile, 'utf8');
            const truncated = raw.length > 65000 ? raw.slice(0, 65000) + '\n\n...(output truncated)' : raw;
            const status = process.env.PLAN_EXIT_CODE === 'success' ? '✅' : '❌';
            const body = `## ${status} Terraform Plan\n\n<details><summary>Show plan</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n</details>`;

            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## ') && c.body.includes('Terraform Plan')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
