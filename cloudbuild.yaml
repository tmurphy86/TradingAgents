steps:
  - id: test
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet . 2>/dev/null
        python -m pytest tests/ -m "unit or smoke" -q --tb=short

  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - api/Dockerfile
      - -t
      - $_REPO_PATH:$COMMIT_SHA
      - -t
      - $_REPO_PATH:latest
      - --cache-from
      - $_REPO_PATH:latest
      - .
    waitFor: [test]

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REPO_PATH
    waitFor: [build]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REPO_PATH:$COMMIT_SHA
      - --region=$_REGION
      - --quiet
    waitFor: [push]

images:
  - $_REPO_PATH:$COMMIT_SHA
  - $_REPO_PATH:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
